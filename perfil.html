<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Perfil — Trekko</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy:#0e1c2f; --blue:#1a5cff; --green:#22c55e; --orange:#f59e0b; }
  body { font-family: 'Nunito', sans-serif; background: #0b1623; color: white; min-height: 100vh; }
  a { text-decoration: none; color: inherit; }
  .page-nav { position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;padding:0 40px;height:64px;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.07); }
  .page-nav-logo { display:flex;align-items:center;gap:10px; }
  .page-nav-logo img { width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:center 18%; }
  .nav-logo-txt { font-size:18px;font-weight:900;color:white; }
  .nav-logo-txt em { font-style:normal;color:var(--green); }
  .back-btn { display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s; }
  .back-btn:hover { background:rgba(255,255,255,.14);color:white; }
  .page-wrap { max-width:1100px;margin:0 auto;padding:32px 40px 60px; }
  .card { background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px;margin-bottom:20px; }
  .card-title { font-size:15px;font-weight:900;color:white;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06); }
  .form-group { margin-bottom:16px; }
  .form-label { font-size:11px;font-weight:800;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:block; }
  .form-input { width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:white;outline:none;transition:all .2s; }
  .form-input:focus { border-color:var(--green);background:rgba(34,197,94,.06); }
  .form-input::placeholder { color:rgba(255,255,255,.3); }
  .btn { background:var(--green);border:none;border-radius:12px;padding:13px 24px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:white;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px; }
  .btn:hover { filter:brightness(1.08);transform:translateY(-1px); }
  .btn-outline { background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8); }
  .btn-outline:hover { background:rgba(255,255,255,.14);color:white;transform:none; }
  .badge { font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;display:inline-block; }
  .bg { background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2); }
  .bb { background:rgba(26,92,255,.12);color:#6d9fff;border:1px solid rgba(26,92,255,.2); }
  .bo { background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2); }
  .br2 { background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2); }
  @media(max-width:768px) { .page-nav{padding:0 16px;} .page-wrap{padding:20px 16px 40px;} }
</style>
  <style>
    .profile-header { display:flex;align-items:center;gap:24px;padding:32px;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.08);border-radius:24px;margin-bottom:24px; }
    .profile-avatar { width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;position:relative; }
    .profile-avatar-edit { position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--green);border:2px solid #0b1623;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer; }
    .profile-info h2 { font-size:22px;font-weight:900;color:white;margin-bottom:4px; }
    .profile-info p { font-size:14px;color:#8fa3b8;margin-bottom:10px; }
    .profile-stats { display:flex;gap:12px;flex-wrap:wrap; }
    .profile-stat { background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 16px;text-align:center; }
    .profile-stat-val { font-size:18px;font-weight:900;color:var(--green); }
    .profile-stat-label { font-size:11px;color:#8fa3b8;font-weight:600; }

    .tabs { display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:24px; }
    .tab { padding:12px 20px;font-size:14px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s; }
    .tab.active { color:white;border-bottom-color:var(--blue); }
    .tab-content { display:none; }
    .tab-content.active { display:block;animation:fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .fav-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:14px; }
    .fav-card { background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s; }
    .fav-card:hover { transform:translateY(-3px);border-color:rgba(255,255,255,.15); }
    .fav-card-img { width:100%;height:100px;object-fit:cover;display:block;background:linear-gradient(135deg,#0f1e2e,#1e3a5f); }
    .fav-card-body { padding:10px 12px; }
    .fav-card-name { font-size:14px;font-weight:800;color:white; }
    .fav-card-meta { font-size:11px;color:#8fa3b8;margin-top:2px; }

    .history-item { display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-bottom:10px;transition:all .2s; }
    .history-item:hover { background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14); }
    .history-icon { font-size:22px;flex-shrink:0; }
    .history-info { flex:1; }
    .history-name { font-size:14px;font-weight:800;color:white; }
    .history-meta { font-size:12px;color:#8fa3b8;margin-top:2px; }
    .history-date { font-size:11px;color:rgba(255,255,255,.3);font-weight:600; }

    .badge-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:12px; }
    .badge-item { background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;text-align:center;transition:all .2s; }
    .badge-item.earned { border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06); }
    .badge-item:not(.earned) { opacity:.4; }
    .badge-emoji { font-size:32px;margin-bottom:8px;display:block; }
    .badge-name { font-size:13px;font-weight:800;color:white;margin-bottom:3px; }
    .badge-desc { font-size:11px;color:#8fa3b8; }

    .edit-row { display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px; }
    @media(max-width:768px) {
      .fav-grid,.badge-grid { grid-template-columns:1fr 1fr; }
      .edit-row { grid-template-columns:1fr; }
      .profile-header { flex-direction:column;text-align:center; }
    }
  </style>
</head>

            <button class="btn btn-outline pref-toggle" data-pref="Cidade" onclick="togglePref(this)">🏙️ Cidade</button>
            <button class="btn btn-outline pref-toggle" data-pref="Natureza" onclick="togglePref(this)">🌿 Natureza</button>
            <button class="btn btn-outline pref-toggle" data-pref="Gastronomia" onclick="togglePref(this)">🍷 Gastronomia</button>
            <button class="btn btn-outline pref-toggle" data-pref="Cultura" onclick="togglePref(this)">🎭 Cultura</button>
          </div>
        </div>
        <button class="btn" style="margin-top:8px" onclick="saveProfile()">💾 Salvar alterações</button>
        <div id="save-msg" style="display:none;margin-top:10px;font-size:14px;font-weight:700;color:var(--green)">✅ Perfil salvo com sucesso!</div>
      </div>
      <div class="card">
        <div class="card-title">Segurança</div>
        <div class="form-group">
          <label class="form-label">Senha atual</label>
          <input class="form-input" type="password" placeholder="••••••••"/>
        </div>
        <div class="edit-row">
          <div class="form-group">
            <label class="form-label">Nova senha</label>
            <input class="form-input" type="password" placeholder="••••••••"/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar nova senha</label>
            <input class="form-input" type="password" placeholder="••••••••"/>
          </div>
        </div>
        <button class="btn" onclick="alert('Senha alterada com sucesso!')">🔒 Alterar senha</button>
      </div>
    </div>

  </div>

  <script>
    var BADGES_ALL = [
      {id:'first_fav',icon:'❤️',name:'Primeiro Favorito',desc:'Salvou o primeiro destino'},
      {id:'explorer',icon:'🗺️',name:'Explorador',desc:'Explorou o mapa interativo'},
      {id:'5favs',icon:'⭐',name:'Colecionador',desc:'5 destinos favoritos'},
      {id:'newsletter',icon:'📧',name:'Conectado',desc:'Assinou a newsletter'},
      {id:'compare',icon:'⚖️',name:'Analista',desc:'Usou o comparador'},
      {id:'search',icon:'🔍',name:'Pesquisador',desc:'Usou a busca inteligente'},
    ];

    var DEST_IMGS_MAP = {
      v1:'rio-de-janeiro,copacabana',v2:'salvador,bahia',v3:'fortaleza,ceara',
      v4:'florianopolis,ilha',v5:'manaus,amazon',v13:'fernando-de-noronha,island',
      c7:'gramado,gaucho',a3:'iguazu-falls,cataratas',h1:'copacabana-palace,rio',
    };

    window.addEventListener('load', function(){
      var draft = JSON.parse(localStorage.getItem('trekko-draft')||'{}');
      var name = draft.fullname || 'Viajante Trekko';
      var email = draft.email || '—';
      var pts = parseInt(localStorage.getItem('trekko-points')||'0');
      var favs = JSON.parse(localStorage.getItem('trekko-favs')||'[]');
      var earnedBadges = JSON.parse(localStorage.getItem('trekko-badges')||'[]');
      var recents = JSON.parse(localStorage.getItem('trekko-recent')||'[]');

      document.getElementById('profile-name').textContent = name;
      document.getElementById('profile-email').textContent = email;
      document.getElementById('avatar-letter').textContent = name.charAt(0).toUpperCase();
      document.getElementById('stat-pts').textContent = pts.toLocaleString('pt-BR');
      document.getElementById('stat-favs').textContent = favs.length;
      document.getElementById('stat-badges').textContent = earnedBadges.length;
      document.getElementById('stat-searches').textContent = recents.length;

      // Prefill edit form
      document.getElementById('edit-name').value = name;
      document.getElementById('edit-email').value = email;
      if(draft.city) document.getElementById('edit-city').value = draft.city;
      if(draft.prefs) draft.prefs.forEach(function(p){
        var btn = document.querySelector('.pref-toggle[data-pref="'+p+'"]');
        if(btn) btn.style.background = 'rgba(34,197,94,.15)', btn.style.borderColor = 'var(--green)', btn.style.color = 'var(--green)';
      });

      // Render favorites
      var grid = document.getElementById('fav-grid');
      if(!favs.length){ grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#8fa3b8">Nenhum favorito ainda.<br><a href="index.html" style="color:var(--green);font-weight:700">Explorar destinos →</a></div>'; }
      else {
        grid.innerHTML = favs.map(function(id){
          var imgKey = DEST_IMGS_MAP[id] || 'brazil,travel';
          return '<div class="fav-card"><img class="fav-card-img" src="https://source.unsplash.com/300x150/?'+imgKey+'" onerror="this.style.background='#1e3a5f';this.src=''"/><div class="fav-card-body"><div class="fav-card-name">Destino '+id.toUpperCase()+'</div><div class="fav-card-meta">Salvo nos favoritos</div></div></div>';
        }).join('');
      }

      // Render history
      var histList = document.getElementById('history-list');
      if(!recents.length){ histList.innerHTML='<div style="text-align:center;padding:40px;color:#8fa3b8">Nenhuma busca recente.</div>'; }
      else {
        histList.innerHTML = recents.map(function(r,i){
          return '<div class="history-item"><span class="history-icon">🔍</span><div class="history-info"><div class="history-name">'+r+'</div><div class="history-meta">Busca realizada</div></div><span class="history-date">Recente</span></div>';
        }).join('');
      }

      // Render badges
      var bg = document.getElementById('badge-grid');
      bg.innerHTML = BADGES_ALL.map(function(b){
        var earned = earnedBadges.indexOf(b.id)>=0;
        return '<div class="badge-item'+(earned?' earned':'')+'"><span class="badge-emoji">'+b.icon+'</span><div class="badge-name">'+b.name+'</div><div class="badge-desc">'+b.desc+'</div>'+(earned?'<div style="margin-top:8px"><span class="badge bg">✅ Conquistado</span></div>':'')+'</div>';
      }).join('');
    });

    function switchProfileTab(id, el){
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
      document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
      el.classList.add('active');
      document.getElementById('tab-'+id).classList.add('active');
    }

    function togglePref(btn){
      var active = btn.style.borderColor === 'var(--green)';
      if(active){ btn.style.background='';btn.style.borderColor='';btn.style.color=''; }
      else { btn.style.background='rgba(34,197,94,.15)';btn.style.borderColor='var(--green)';btn.style.color='var(--green)'; }
    }

    function saveProfile(){
      var draft = JSON.parse(localStorage.getItem('trekko-draft')||'{}');
      draft.fullname = document.getElementById('edit-name').value;
      draft.email = document.getElementById('edit-email').value;
      draft.city = document.getElementById('edit-city').value;
      var prefs = [];
      document.querySelectorAll('.pref-toggle').forEach(function(b){
        if(b.style.borderColor==='var(--green)') prefs.push(b.dataset.pref);
      });
      draft.prefs = prefs;
      localStorage.setItem('trekko-draft', JSON.stringify(draft));
      document.getElementById('profile-name').textContent = draft.fullname;
      document.getElementById('avatar-letter').textContent = draft.fullname.charAt(0).toUpperCase();
      var msg = document.getElementById('save-msg');
      msg.style.display = 'block';
      setTimeout(function(){ msg.style.display='none'; }, 3000);
    }

    function updateAvatar(input){
      if(!input.files[0]) return;
      var reader = new FileReader();
      reader.onload = function(e){
        var av = document.getElementById('profile-avatar');
        av.innerHTML = '<img src="'+e.target.result+'" style="width:90px;height:90px;border-radius:50%;object-fit:cover"/><div class="profile-avatar-edit" onclick="document.getElementById('avatar-input').click()">✏️</div><input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="updateAvatar(this)"/>';
      };
      reader.readAsDataURL(input.files[0]);
    }
  </script>
</body>
</html>
