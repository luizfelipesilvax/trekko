<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roteiros — Trekko</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="roteiros.css"/>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <img src="uploads/trekko-logo2-transparent.png" alt="Trekko" style="height: 48px; width: 48px; object-fit: cover; border-radius: 50%;" />
  </a>
  <a href="index.html" class="nav-back">← Voltar ao início</a>
</nav>

<div class="hero">
  <h1>Roteiros <em>prontos</em> para você</h1>
  <p>Roteiros detalhados dia a dia para os melhores destinos do Brasil — basta escolher e viajar.</p>
</div>

<div class="filters-row">
  <button class="fil active" onclick="filtrar('Todos',this)">Todos</button>
  <button class="fil" onclick="filtrar('Praia',this)">🏖️ Praia</button>
  <button class="fil" onclick="filtrar('Montanha',this)">🏔️ Montanha</button>
  <button class="fil" onclick="filtrar('Cultura',this)">🎭 Cultura</button>
  <button class="fil" onclick="filtrar('Natureza',this)">🌿 Natureza</button>
  <button class="fil" onclick="filtrar('Aventura',this)">🧗 Aventura</button>
  <button class="fil" onclick="filtrar('Gastronômico',this)">🍷 Gastronômico</button>
</div>

<div class="grid" id="grid"></div>

<script>
var ROTEIROS = [
  {id:1,title:'Rio Clássico',dest:'Rio de Janeiro, RJ',img:'https://loremflickr.com/600/400/riodejaneiro,copacabana',tipo:['Praia','Cultura'],nivel:'facil',dias:['Cristo Redentor','Copacabana','Santa Teresa'],preco:'R$ 149/voo',duracao:'5 dias'},
  {id:2,title:'Nordeste Selvagem',dest:'Fortaleza + Jericoacoara, CE',img:'https://loremflickr.com/600/400/jericoacoara,duna,lagoa',tipo:['Praia','Aventura'],nivel:'medio',dias:['Jericoacoara','Lagoa Azul','Lençóis'],preco:'R$ 319/voo',duracao:'7 dias'},
  {id:3,title:'Serra Gaúcha Romântica',dest:'Gramado + Canela, RS',img:'https://loremflickr.com/600/400/gramado,chale,inverno',tipo:['Montanha','Gastronômico'],nivel:'facil',dias:['Gramado','Canela','Bento Gonçalves'],preco:'R$ 199/voo',duracao:'4 dias'},
  {id:4,title:'Amazônia Profunda',dest:'Manaus + Rio Negro, AM',img:'https://loremflickr.com/600/400/amazon,jungle,manaus',tipo:['Natureza','Aventura'],nivel:'aventura',dias:['Teatro Amazonas','Encontro das Águas','Selva'],preco:'R$ 499/voo',duracao:'6 dias'},
  {id:5,title:'Minas Históricas',dest:'Ouro Preto + Tiradentes, MG',img:'https://loremflickr.com/600/400/ouropreto,colonial,minas',tipo:['Cultura','Gastronômico'],nivel:'facil',dias:['Ouro Preto','Mariana','Tiradentes'],preco:'R$ 79/ônibus',duracao:'4 dias'},
  {id:6,title:'Pantanal Safari',dest:'Campo Grande + Bonito, MS',img:'https://loremflickr.com/600/400/pantanal,wildlife,safari',tipo:['Natureza','Aventura'],nivel:'medio',dias:['Pantanal','Bonito','Gruta Azul'],preco:'R$ 399/voo',duracao:'6 dias'},
  {id:7,title:'Ilha Grande Paradise',dest:'Angra dos Reis + Ilha Grande, RJ',img:'https://loremflickr.com/600/400/ilhagrande,beach,rio',tipo:['Praia','Natureza'],nivel:'facil',dias:['Lagoa Azul','Lopes Mendes','Dois Rios'],preco:'R$ 30/ferry',duracao:'4 dias'},
  {id:8,title:'Cataratas + Missões',dest:'Foz do Iguaçu + Missões, PR',img:'https://loremflickr.com/600/400/iguazufalls,cataratas,waterfall',tipo:['Natureza','Cultura'],nivel:'facil',dias:['Cataratas BR','Cataratas AR','Missões'],preco:'R$ 80/ônibus',duracao:'4 dias'},
  {id:9,title:'Chapada dos Deuses',dest:'Chapada Diamantina, BA',img:'https://loremflickr.com/600/400/chapadadiamantina,cachoeira',tipo:['Natureza','Aventura'],nivel:'aventura',dias:['Cachoeira da Fumaça','Morro do Pai Inácio','Poço Encantado'],preco:'R$ 289/voo',duracao:'5 dias'},
];

var current = 'Todos';

function filtrar(tipo, btn) {
  current = tipo;
  document.querySelectorAll('.fil').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  var filtered = current === 'Todos' ? ROTEIROS : ROTEIROS.filter(function(r){return r.tipo.indexOf(current)>=0;});
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  filtered.forEach(function(r){
    var div = document.createElement('div');
    div.className = 'rcard';
    var daysHTML = r.dias.map(function(d,i){return '<div class="rcard-day"><div class="rcard-day-n">Dia '+(i+1)+'</div><div class="rcard-day-txt">'+d+'</div></div>';}).join('');
    var tagsHTML = r.tipo.map(function(t){return '<span class="rcard-tag">'+t+'</span>';}).join('');
    
    var thumb = document.createElement('div');
    thumb.className = 'rcard-thumb';
    var img = document.createElement('img');
    img.className = 'rcard-img';
    img.src = r.img;
    img.alt = r.title;
    img.onerror = function() { this.style.background = '#1e3a5f'; this.src = ''; };
    thumb.appendChild(img);
    var badgeText = r.nivel === 'facil' ? 'Fácil' : (r.nivel === 'medio' ? 'Médio' : 'Aventura');
    thumb.innerHTML += '<span class="rcard-badge badge-' + r.nivel + '">' + badgeText + '</span>';
    
    var body = document.createElement('div');
    body.className = 'rcard-body';
    body.innerHTML = '<div class="rcard-title">'+r.title+'</div><div class="rcard-dest">📍 '+r.dest+' · '+r.duracao+'</div><div class="rcard-tags">'+tagsHTML+'</div><div class="rcard-days">'+daysHTML+'</div><div class="rcard-footer"><div class="rcard-price">'+r.preco+'</div><button class="rcard-btn" onclick="window.location.href=\'index.html\'">Ver rota ✈️</button></div>';
    
    div.appendChild(thumb);
    div.appendChild(body);
    grid.appendChild(div);
  });
}
renderGrid();
</script>
</body>
</html>
